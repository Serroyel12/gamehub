<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Arena Conquest - RankArena</title>
    <link rel="stylesheet" href="../../../assets/css/base.css">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .game-ui-overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(15px); padding: 20px; }
        .setup-card { background: #0f172a; border: 2px solid #f59e0b; padding: 30px; border-radius: 24px; text-align: center; max-width: 500px; width: 100%; box-shadow: 0 0 50px rgba(245, 158, 11, 0.15); }
        
        .arena-players-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .player-tag { display: flex; align-items: center; justify-content: space-between; background: rgba(15, 23, 42, 0.8); padding: 8px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); min-width: 200px; transition: opacity 0.3s; }
        .player-tag img { width: 24px; height: 24px; margin-right: 8px; border-radius: 4px; }
        .p-name { font-weight: bold; font-size: 13px; color: #fff; }
        .p-elo { font-size: 11px; color: #f59e0b; font-weight: 800; }
        
        .border-p1 { border-left: 4px solid #38bdf8; }
        .border-p2 { border-left: 4px solid #f59e0b; }
        .border-p3 { border-left: 4px solid #10b981; }
        .border-p4 { border-left: 4px solid #ef4444; }

        .mode-selector { display: flex; gap: 10px; justify-content: center; margin: 15px 0; }
        .mode-btn.primary { background: #f59e0b; color: #000; }
        
        .tutorial-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; margin-top: 15px; }
        .step-card { background: rgba(255,255,255,0.02); padding: 10px; border-radius: 8px; border: 1px solid rgba(245, 158, 11, 0.1); }
    </style>
</head>
<body>

    <div id="setup-screen" class="game-ui-overlay">
        <div class="setup-card">
            <h2 style="color: #f59e0b; font-weight: 900; letter-spacing: 2px;">MODALIDAD DE ARENA</h2>
            <p class="muted">Selecciona el número de guerreros</p>
            
            <div class="mode-selector">
                <button class="btn btn-ghost mode-btn primary" data-players="2">2 JUGS</button>
                <button class="btn btn-ghost mode-btn" data-players="3">3 JUGS</button>
                <button class="btn btn-ghost mode-btn" data-players="4">4 JUGS</button>
            </div>

            <div style="display: flex; gap: 10px; margin: 20px 0;">
                <button id="btn-create-arena" class="btn primary" style="flex: 1;">CREAR SALA</button>
                <input id="input-join-code" placeholder="CÓDIGO" style="width: 110px; padding: 12px; border-radius: 10px; border: 1px solid rgba(245, 158, 11, 0.4); background: #020617; color: white; text-align: center; text-transform: uppercase; font-weight: bold;">
                <button id="btn-join-arena" class="btn ghost">UNIRSE</button>
            </div>

            <div class="tutorial-grid">
                <div class="step-card">
                    <h4 style="color:#f59e0b; font-size:12px; margin:0;">⚔️ CAPTURA</h4>
                    <p style="font-size:10px; color:#94a3b8; margin:0;">Rodea al enemigo para convertir su color.</p>
                </div>
                <div class="step-card">
                    <h4 style="color:#f59e0b; font-size:12px; margin:0;">🏆 ELO</h4>
                    <p style="font-size:10px; color:#94a3b8; margin:0;">Gana para subir en el ranking global.</p>
                </div>
            </div>
        </div>
    </div>

    <div class="game-container">
        <div class="arena-players-grid">
            <div id="p1-ui" class="player-tag border-p1">
                <div><img id="p1-badge" src=""> <span id="p1-name" class="p-name">---</span></div>
                <div class="p-elo">ELO: <span id="p1-elo">--</span></div>
            </div>
            <div id="p2-ui" class="player-tag border-p2">
                <div><img id="p2-badge" src=""> <span id="p2-name" class="p-name">---</span></div>
                <div class="p-elo">ELO: <span id="p2-elo">--</span></div>
            </div>
        </div>

        <main style="position: relative;">
            <canvas id="gameCanvas" width="800" height="450"></canvas>
            <div id="player-turn" style="position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: #f59e0b; color: #000; padding: 4px 20px; border-radius: 20px; font-weight: 900; font-size: 11px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display:none;">TU TURNO</div>
        </main>

        <div class="arena-players-grid" style="margin-top: 10px;">
            <div id="p3-ui" class="player-tag border-p3">
                <div><img id="p3-badge" src=""> <span id="p3-name" class="p-name">---</span></div>
                <div class="p-elo">ELO: <span id="p3-elo">--</span></div>
            </div>
            <div id="p4-ui" class="player-tag border-p4">
                <div><img id="p4-badge" src=""> <span id="p4-name" class="p-name">---</span></div>
                <div class="p-elo">ELO: <span id="p4-elo">--</span></div>
            </div>
        </div>

        <footer class="game-controls" style="display:flex; align-items:center; justify-content:space-between; margin-top:15px;">
            <button id="btn-end-turn" class="btn" disabled>PASAR TURNO</button>
            <div id="hex-count-ui" style="color: #f59e0b; font-weight: 800; background: rgba(0,0,0,0.3); padding: 8px 15px; border-radius: 8px;">
                Hexágonos: <span id="conquest-count">0</span>
            </div>
        </footer>
    </div>

    <script type="module" src="game.js"></script>
</body>
</html>

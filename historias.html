<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Códice Prehistórico - RankArena</title>
  <link rel="icon" type="image/png" href="assets/img/logo_dino.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/historias.css">
  
  <style>
    /* Ajustes para mantener la coherencia con el Hero de la Home */
    .section-header {
      padding: 60px 20px;
      background: linear-gradient(135deg, rgba(245, 158, 11, 0.05), rgba(10, 25, 12, 0.9));
      border: 1px solid rgba(245, 158, 11, 0.2);
      border-radius: 12px;
      margin-top: 20px;
      text-align: center;
    }
    
    .title-amber {
      color: #f59e0b;
      text-transform: uppercase;
      font-weight: 900;
      text-shadow: 0 0 15px rgba(245, 158, 11, 0.3);
    }

    /* CONTROLES DE AUDIO */
    .audio-player {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(10, 25, 12, 0.95);
      border: 1px solid #f59e0b;
      padding: 12px 18px;
      border-radius: 50px;
      display: flex;
      align-items: center;
      gap: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      z-index: 1000;
    }

    .audio-btn {
      background: none;
      border: none;
      color: #f59e0b;
      cursor: pointer;
      font-size: 18px;
      transition: transform 0.2s;
      display: flex;
      align-items: center;
    }

    .audio-btn:hover { transform: scale(1.1); }

    .volume-slider {
      width: 80px;
      accent-color: #f59e0b;
      cursor: pointer;
    }

    .audio-label {
      font-size: 10px;
      color: #9ba896;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-right: 5px;
    }
  </style>
</head>
<body>

<header class="navbar">
  <div class="container navbar-inner">
    <a class="brand" href="index.html">
      <span class="mark"></span>
      <span>RankArena</span>
    </a>

    <nav class="nav-links">
      <a href="index.html">Inicio</a>
      <a href="games.html">Juegos</a>
      <a href="community.html">Comunidad</a>
      <a href="altar.html">Altar</a>
      <a href="historias.html" class="active">Códice Prehistórico</a>
    </nav>

    <div class="nav-right" style="display:flex; gap:10px; align-items:center;">
      <span class="pill"><b id="navUserName">Invitado</b></span>
      <a class="btn btn-ghost" id="navLoginBtn" href="login.html">Login</a>
      <a class="btn btn-ghost" id="navProfileBtn" href="profile.html" style="display:none;">Perfil</a>
      <button class="btn btn-ghost" id="navLogoutBtn" type="button" style="display:none;">Salir</button>
    </div>
  </div>
</header>

<main class="container">
  <header class="section-header">
    <h1 class="title-amber" style="font-size: 2.5rem; letter-spacing: 2px; margin-bottom: 10px;">📜 Códice Prehistórico</h1>
    <p class="muted" style="max-width: 600px; margin: 0 auto; line-height: 1.6;">
      Explora los seres prehistóricos más famosos de todos los tiempos. Haz clic en cada criatura para desvelar los pergaminos de su historia y secretos de combate.
    </p>
  </header>

  <section class="section">
    <div class="dino-grid" id="dino-container"></div>
  </section>

  <div class="spacer" style="height: 40px;"></div>
</main>

<div id="story-modal" class="modal-overlay" onclick="closeStory(event)">
  <div class="modal-content" style="border-color: #f59e0b; box-shadow: 0 0 30px rgba(245, 158, 11, 0.2);">
    <span class="close-btn" onclick="document.getElementById('story-modal').style.display='none'">&times;</span>
    <h3 id="modal-title" class="title-amber" style="text-align: center; margin-bottom: 15px; letter-spacing: 1px;"></h3>
    <div class="story-image-wrapper">
      <img id="story-full-img" src="" alt="Cargando historia...">
    </div>
  </div>
</div>

<div class="audio-player">
  <span class="audio-label">Ambiente</span>
  <button class="audio-btn" id="audio-play-pause" title="Pausar/Reproducir">
    <span id="audio-icon">▶️</span>
  </button>
  <button class="audio-btn" id="audio-restart" title="Reiniciar">
    🔄
  </button>
  <input type="range" class="volume-slider" id="audio-volume" min="0" max="1" step="0.1" value="0.5">
</div>

<audio id="bg-theme" loop>
  <source src="assets/audio/theme.mp3" type="audio/mpeg">
</audio>

<script src="assets/js/app.js"></script>
<script src="assets/js/ui.js"></script>
<script src="assets/js/historias.js"></script>
<script type="module">
  import { initNavbarAuth } from "./assets/js/nav-auth.js";
  initNavbarAuth();
</script>

<script>
  const audio = document.getElementById('bg-theme');
  const playPauseBtn = document.getElementById('audio-play-pause');
  const restartBtn = document.getElementById('audio-restart');
  const volumeSlider = document.getElementById('audio-volume');
  const icon = document.getElementById('audio-icon');

  // Reproducir automáticamente (con manejo de restricciones del navegador)
  window.addEventListener('click', () => {
    if (audio.paused && !audio.ended && audio.currentTime === 0) {
      audio.play().catch(e => console.log("Auto-play bloqueado hasta interacción"));
      icon.textContent = "⏸️";
    }
  }, { once: true });

  playPauseBtn.addEventListener('click', () => {
    if (audio.paused) {
      audio.play();
      icon.textContent = "⏸️";
    } else {
      audio.pause();
      icon.textContent = "▶️";
    }
  });

  restartBtn.addEventListener('click', () => {
    audio.currentTime = 0;
    audio.play();
    icon.textContent = "⏸️";
  });

  volumeSlider.addEventListener('input', (e) => {
    audio.volume = e.target.value;
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>RankArena - Login</title>
  <link rel="icon" type="image/png" href="assets/img/logo_dino.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="assets/css/base.css">
</head>
<body>

<header class="navbar">
  <div class="container navbar-inner">
    <a class="brand" href="index.html">
      <span class="mark"></span>
      <span>RankArena</span>
    </a>

    <nav class="nav-links">
      <a href="index.html">Inicio</a>
      <a href="games.html">Juegos</a>
      <a href="community.html">Comunidad</a>
      <a href="noticias.html">Ecos Jurásicos</a>
      <a href="altar.html">Altar</a>
      <a href="historias.html">Codice Prehisotrico</a>

    </nav>
  </div>
</header>

<main class="container">
  <section class="section">
    <div class="card" style="max-width:520px;margin:0 auto;">
      <div class="card-body">
        <div class="card-title">👤 Acceso</div>
        <div class="card-text">Registro y login real con Firebase.</div>

        <div style="margin-top:12px; display:grid; gap:10px;">
          <input id="nickname" placeholder="Nickname (solo para registro)"
                 style="padding:12px; border-radius:12px; border:1px solid rgba(148,163,184,.2); background:rgba(15,23,42,.55); color:var(--text); outline:none;">

          <input id="email" placeholder="Email" type="email"
                 style="padding:12px; border-radius:12px; border:1px solid rgba(148,163,184,.2); background:rgba(15,23,42,.55); color:var(--text); outline:none;">

          <input id="pass" placeholder="Contraseña" type="password"
                 style="padding:12px; border-radius:12px; border:1px solid rgba(148,163,184,.2); background:rgba(15,23,42,.55); color:var(--text); outline:none;">

          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button class="btn btn-primary" id="btnRegister" type="button">Crear cuenta</button>
            <button class="btn btn-ghost" id="btnLogin" type="button">Entrar</button>
            <button class="btn btn-ghost" id="btnLogout" type="button" style="display:none;">Salir</button>
          </div>

          <div id="msg" class="pill" style="display:none;"></div>

          <div style="margin-top:10px;">
            <a class="btn btn-ghost" href="profile.html">⚙️ Ir a mi perfil</a>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>

<script type="module">
  import { register, login, logout, watchAuth } from "./assets/js/auth.js";

  const $ = (id) => document.getElementById(id);
  const msg = $("msg");
  const btnRegister = $("btnRegister");
  const btnLogin = $("btnLogin");
  const btnLogout = $("btnLogout");

  function show(text, ok=true){
    msg.style.display = "inline-flex";
    msg.textContent = text;
    msg.style.borderColor = ok ? "rgba(34,197,94,.35)" : "rgba(239,68,68,.35)";
  }

  watchAuth((user) => {
    if (user){
      btnLogout.style.display = "inline-flex";
      btnLogin.style.display = "none";
      btnRegister.style.display = "none";
      show(`✅ Sesión iniciada: ${user.email}`, true);
    } else {
      btnLogout.style.display = "none";
      btnLogin.style.display = "inline-flex";
      btnRegister.style.display = "inline-flex";
      msg.style.display = "none";
    }
  });

  btnRegister.addEventListener("click", async () => {
    try {
      const nickname = $("nickname").value.trim();
      const email = $("email").value.trim();
      const pass = $("pass").value;

      if (!email || !pass){
        show("❌ Email y contraseña son obligatorios.", false);
        return;
      }
      await register(email, pass, nickname);
      show("✅ Cuenta creada y sesión iniciada.", true);
    } catch (e) {
      show("❌ " + (e?.message || "Error registrando."), false);
      console.error(e);
    }
  });

  btnLogin.addEventListener("click", async () => {
    try {
      const email = $("email").value.trim();
      const pass = $("pass").value;
      if (!email || !pass){
        show("❌ Email y contraseña son obligatorios.", false);
        return;
      }
      await login(email, pass);
      show("✅ Login correcto.", true);
    } catch (e) {
      show("❌ " + (e?.message || "Error login."), false);
      console.error(e);
    }
  });

  btnLogout.addEventListener("click", async () => {
    try {
      await logout();
      show("✅ Sesión cerrada.", true);
    } catch (e) {
      show("❌ " + (e?.message || "Error logout."), false);
    }
  });
</script>

</body>
</html>
